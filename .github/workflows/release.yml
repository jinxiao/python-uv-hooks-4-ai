name: Release

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Compute semantic version
        id: semver
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          branch="${GITHUB_REF_NAME}"
          git fetch --force --tags

          output_existing_tag() {
            local release_tag="$1"

            echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
            echo "version=${release_tag#v}" >> "${GITHUB_OUTPUT}"
            echo "should_create_tag=false" >> "${GITHUB_OUTPUT}"

            if gh release view "${release_tag}" >/dev/null 2>&1; then
              echo "should_release=false" >> "${GITHUB_OUTPUT}"
              echo "Release ${release_tag} already exists."
            else
              echo "should_release=true" >> "${GITHUB_OUTPUT}"
              echo "Release tag ${release_tag} exists, but the GitHub release is missing; publishing it."
            fi
          }

          if [[ "${branch}" != "main" && "${branch}" != "dev" ]]; then
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            echo "should_create_tag=false" >> "${GITHUB_OUTPUT}"
            echo "Manual releases only run from main or dev; current branch is ${branch}."
            exit 0
          fi

          stable_tag_at_head="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          beta_tag_at_head="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$' | head -n 1 || true)"

          if [[ "${branch}" == "main" && -n "${stable_tag_at_head}" ]]; then
            output_existing_tag "${stable_tag_at_head}"
            exit 0
          fi

          if [[ "${branch}" == "dev" && -n "${beta_tag_at_head}" ]]; then
            output_existing_tag "${beta_tag_at_head}"
            exit 0
          fi

          latest_stable="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
          if [[ -n "${latest_stable}" ]]; then
            base_version="${latest_stable#v}"
            commit_range="${latest_stable}..HEAD"
          else
            base_version="0.0.0"
            commit_range="HEAD"
          fi

          IFS=. read -r major minor patch <<< "${base_version}"
          messages="$(git log --format='%s%n%b' "${commit_range}")"

          if grep -Eq '(^|[[:space:]])BREAKING[ -]CHANGE:|^[A-Za-z]+(\([^)]+\))?!:' <<< "${messages}"; then
            major=$((major + 1))
            minor=0
            patch=0
          elif grep -Eq '^feat(\([^)]+\))?:' <<< "${messages}"; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          next_version="${major}.${minor}.${patch}"

          if [[ "${branch}" == "dev" ]]; then
            beta_prefix="v${next_version}-beta."
            beta_number=0
            while IFS= read -r tag; do
              number="${tag#${beta_prefix}}"
              if [[ "${number}" =~ ^[0-9]+$ && "${number}" -gt "${beta_number}" ]]; then
                beta_number="${number}"
              fi
            done < <(git tag --list "${beta_prefix}*")
            beta_number=$((beta_number + 1))
            tag="${beta_prefix}${beta_number}"
            version="${next_version}-beta.${beta_number}"
          else
            tag="v${next_version}"
            version="${next_version}"
          fi

          echo "should_release=true" >> "${GITHUB_OUTPUT}"
          echo "should_create_tag=true" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create release tag
        if: steps.semver.outputs.should_create_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.semver.outputs.tag }}" -m "Release ${{ steps.semver.outputs.tag }}"
          git push origin "refs/tags/${{ steps.semver.outputs.tag }}"

      - name: Run GoReleaser
        if: steps.semver.outputs.should_release == 'true'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.semver.outputs.tag }}
