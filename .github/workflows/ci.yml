name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - dev

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Test installer
        run: |
          sh -n scripts/install.sh
          sh -n scripts/test-install-sh.sh
          sh scripts/test-install-sh.sh
